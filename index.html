<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- daisy ui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- css link -->
    <link rel="stylesheet" href="./style.css">
    <title>GitHub Issues Tracker</title>
  </head>

  <body class="bg-[#F8FAFC]">
    <!-- header sectio  -->
    <header
      class="flex flex-col space-y-5 justify-between w-11/12 mx-auto items-center p-6 md:flex-row md:space-y-0"
    >
      <div class="flex items-center gap-2">
        <img class="w-10" src="./assets/github-logo.png" alt="" />
        <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
      </div>
      <!-- search  -->
      <div class="join">
        <label class="input validator join-item"
          ><i class="fa-solid fa-magnifying-glass"></i>
          <input id="search-input" type="text" placeholder="Search issues..." required />
        </label>
        <button id="search-btn" class="btn btn-primary join-item">
          <i class="fa-solid fa-plus"></i>New Issue
        </button>
      </div>
    </header>
    <hr class="text-gray-300" />
    <main class="w-full md:w-9/12 mx-auto">
      <!-- button  -->
      <section class="bg-white mt-10 space-x-3 p-6 rounded-2xl">
        <button onclick="loadbtn(id)" id="all" class="btn px-10 btn-primary">
          All
        </button>
        <button onclick="loadbtn(id)" id="open" class="btn px-8">Open</button>
        <button onclick="loadbtn(id)" id="closed" class="btn px-6">
          Closed
        </button>
      </section>
      <!-- card section  -->
      <section class="shadow-2xl rounded-2xl">
        <!-- track project  -->
        <div
          class="flex flex-col md:flex-row justify-between items-center mt-3 p-7"
        >
          <div class="flex items-center gap-3">
            <img
              class="bg-[#ECE4FF] rounded-[100%] p-3"
              src="assets/Aperture.png"
              alt=""
            />
            <div>
              <!-- issues -->
              <h1 class="font-bold"><span id="issues-count">0</span> Issues</h1>

              <p class="text-gray-500">Track and manage your project issues</p>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <span class="w-3 h-3 bg-green-600 rounded-full"></span>
            <h1 class="font-semibold">Open</h1>
            <span class="w-3 h-3 bg-purple-500 rounded-full"></span>
            <h1 class="font-semibold">Closed</h1>
          </div>
        </div>
        <hr class="text-gray-500" />
        <!-- card section  -->
        <div id="card-container" class="p-10 grid grid-cols-1 md:grid-cols-4 gap-5 h[100%]">
        </div>
      
        <!-- loading -->
         <div id="loading-spinner" class=" flex ustify-center items-center p-10hidden ">
            <span class="loading loading-spinner loading-xl"></span>
         </div>
      </section>
      <!-- modal section -->
  

<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
      <div id="modal-card"></div>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>
    </main>
    <!-- js link  -->
    <script src="./script/script.js"></script>
  </body>
</html>
