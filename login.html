<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- daisy ui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- google font  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- css link -->
    <link rel="stylesheet" href="./style.css" />
    <title>GitHub Issues Tracker/login page</title>
  </head>
  <body class="bg-gray-200 min-h-screen flex items-center justify-center">
    <!-- login  -->
      <div class="bg-white w-full max-w-md p-7 rounded-xl shadow-xl">
        <!-- text section  -->
        <div class="space-y-3">
          <img class="mx-auto" src="./assets/github-logo.png" alt="" />
          <h1 class="text-center font-semibold text-2xl">
            GitHub Issues Tracker
          </h1>
          <p class="text-center text-gray-500">Sign in to manage your issues</p>
        </div>

        <!-- input section  -->
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="">Username</label>
            <input id="userName-input" type="text" class="input" placeholder="Enter Username" />
            <p class="text-[#4A00FF]">Default: admin</p>

            <label class="Enter Password">Password</label>
            <input id="password-input" type="password" class="input" placeholder="Enter Password" />
            <p class="text-[#4A00FF]">Default: admin123</p>

            <button id="singIn-btn" class="btn btn-primary mt-4">Sign In</button>
          </fieldset>
        </div>
      </div>

    <!-- js link  -->

    <script src="./js/login.js"></script>
  </body>
</html>
